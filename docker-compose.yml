services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vision_capital_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vision_capital_ai"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  clamav:
    image: clamav/clamav:1.4
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1:1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    working_dir: /app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage_data
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.example}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: ./backend
    working_dir: /app
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage_data
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.example}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy

  frontend:
    working_dir: /app
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /
    environment:
      VITE_API_BASE_URL: /
    env_file:
      - ${FRONTEND_ENV_FILE:-./frontend/.env.example}
    ports:
      - "8090:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_storage:
