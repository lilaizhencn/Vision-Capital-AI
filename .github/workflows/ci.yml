name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt
      - run: pytest -q
      - run: python -m compileall -q app
      - run: python -m pip check
      - run: alembic heads

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Start the full stack
        run: docker compose up -d --build
      - name: Wait for the API and frontend
        run: |
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://localhost:8000/health >/dev/null && curl --fail --silent http://localhost:5173/ >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          exit 1
      - name: Exercise auth, project, upload, and worker parsing
        run: |
          set -euo pipefail
          email="ci-${GITHUB_RUN_ID}@example.com"
          register=$(curl --fail --silent -X POST http://localhost:8000/api/auth/register -H 'Content-Type: application/json' -d "{\"email\":\"${email}\",\"username\":\"ci${GITHUB_RUN_ID}\",\"password\":\"Strong-password-123!\"}")
          token=$(echo "$register" | jq -r .access_token)
          project=$(curl --fail --silent -X POST http://localhost:8000/api/projects -H "Authorization: Bearer $token" -H 'Content-Type: application/json' -d '{"name":"CI Project","company_name":"CI Company","industry":"SaaS","stage":"Seed"}')
          project_id=$(echo "$project" | jq -r .id)
          monitoring=$(curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/monitoring" -H "Authorization: Bearer $token" -H 'Content-Type: application/json' -d '{"metric_name":"Monthly revenue","metric_value":"320","metric_unit":"万元","risk_level":"watch","note":"CI monitoring smoke test"}')
          test "$(echo "$monitoring" | jq -r .risk_level)" = "watch"
          monitoring_list=$(curl --fail --silent "http://localhost:8000/api/projects/$project_id/monitoring" -H "Authorization: Bearer $token")
          test "$(echo "$monitoring_list" | jq -r 'length')" -eq 1
          printf 'Revenue grew 20 percent\n' > /tmp/vision-ci.txt
          curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/files/upload" -H "Authorization: Bearer $token" -F upload_file=@/tmp/vision-ci.txt
          for attempt in $(seq 1 60); do
            files=$(curl --fail --silent "http://localhost:8000/api/projects/$project_id/files" -H "Authorization: Bearer $token")
            status=$(echo "$files" | jq -r '.[0].parse_status // "missing"')
            if [ "$status" = "completed" ]; then
              echo "$files" | jq -e '.[0].virus_scan_status == "clean" or .[0].virus_scan_status == "skipped"' >/dev/null
              break
            fi
            if [ "$status" = "failed" ]; then
              echo "$files"
              exit 1
            fi
            sleep 5
          done
          test "$status" = "completed"

          curl --fail --silent --location https://raw.githubusercontent.com/tesseract-ocr/tessdoc/main/images/eurotext.png -o /tmp/vision-ci-receipt.png
          image_upload=$(curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/files/upload" -H "Authorization: Bearer $token" -F upload_file=@/tmp/vision-ci-receipt.png)
          image_file_id=$(echo "$image_upload" | jq -r '.file.id')
          for attempt in $(seq 1 60); do
            image_files=$(curl --fail --silent "http://localhost:8000/api/projects/$project_id/files" -H "Authorization: Bearer $token")
            image_status=$(echo "$image_files" | jq -r --arg id "$image_file_id" '.[] | select(.id == $id) | .parse_status // "missing"')
            if [ "$image_status" = "completed" ]; then
              break
            fi
            if [ "$image_status" = "failed" ]; then
              echo "$image_files"
              exit 1
            fi
            sleep 5
          done
          test "$image_status" = "completed"
          ocr_chars=$(docker compose exec -T backend python -c "from app.core.database import SessionLocal; from app.models.file import ProjectFile; db=SessionLocal(); f=db.get(ProjectFile, '$image_file_id'); print(len(f.parsed_text or '')); db.close()")
          test "$ocr_chars" -gt 0

          curl --fail --silent --show-error --location https://raw.githubusercontent.com/pdf-association/pdf20examples/master/pdf20-utf8-test.pdf -o /tmp/vision-public.pdf
          test -s /tmp/vision-public.pdf
          pdf_upload=$(curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/files/upload" -H "Authorization: Bearer $token" -F upload_file=@/tmp/vision-public.pdf)
          pdf_file_id=$(echo "$pdf_upload" | jq -r '.file.id')
          for attempt in $(seq 1 60); do
            public_files=$(curl --fail --silent "http://localhost:8000/api/projects/$project_id/files" -H "Authorization: Bearer $token")
            public_status=$(echo "$public_files" | jq -r --arg id "$pdf_file_id" '.[] | select(.id == $id) | .parse_status // "missing"')
            if [ "$public_status" = "completed" ]; then break; fi
            if [ "$public_status" = "failed" ]; then echo "$public_files"; exit 1; fi
            sleep 5
          done
          test "$public_status" = "completed"
          pdf_text=$(docker compose exec -T backend python -c "from app.core.database import SessionLocal; from app.models.file import ProjectFile; db=SessionLocal(); f=db.get(ProjectFile, '$pdf_file_id'); print(f.parsed_text or ''); db.close()")
          echo "public PDF parsed chars: ${#pdf_text}"
          echo "$pdf_text" | grep -iE "UTF-8|PDF 2.0" >/dev/null

          curl --fail --silent --show-error --location https://raw.githubusercontent.com/PacktPublishing/Getting-Started-with-Tableau-2019.2/master/Chapter03/Sample-Superstore.xlsx -o /tmp/vision-public.xlsx
          test -s /tmp/vision-public.xlsx
          xlsx_upload=$(curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/files/upload" -H "Authorization: Bearer $token" -F upload_file=@/tmp/vision-public.xlsx)
          xlsx_file_id=$(echo "$xlsx_upload" | jq -r '.file.id')
          for attempt in $(seq 1 60); do
            public_files=$(curl --fail --silent "http://localhost:8000/api/projects/$project_id/files" -H "Authorization: Bearer $token")
            public_status=$(echo "$public_files" | jq -r --arg id "$xlsx_file_id" '.[] | select(.id == $id) | .parse_status // "missing"')
            if [ "$public_status" = "completed" ]; then break; fi
            if [ "$public_status" = "failed" ]; then echo "$public_files"; exit 1; fi
            sleep 5
          done
          test "$public_status" = "completed"
          xlsx_text=$(docker compose exec -T backend python -c "from app.core.database import SessionLocal; from app.models.file import ProjectFile; db=SessionLocal(); f=db.get(ProjectFile, '$xlsx_file_id'); print(f.parsed_text or ''); db.close()")
          echo "public Excel parsed chars: ${#xlsx_text}"
          echo "$xlsx_text" | grep -i "Orders" >/dev/null

          checksum=$(sha256sum /tmp/vision-ci.txt | awk '{print $1}')
          batch=$(curl --fail --silent -X POST "http://localhost:8000/api/projects/$project_id/file-batches" \
            -H "Authorization: Bearer $token" -H 'Content-Type: application/json' \
            -d "{\"files\":[{\"filename\":\"batch-ci.txt\",\"size\":24,\"content_type\":\"text/plain\",\"checksum_sha256\":\"$checksum\"}]}" )
          batch_id=$(echo "$batch" | jq -r .id)
          batch_file_id=$(echo "$batch" | jq -r '.files[0].id')
          resumed=$(curl --fail --silent "http://localhost:8000/api/file-batches/$batch_id" -H "Authorization: Bearer $token")
          test "$(echo "$resumed" | jq -r '.upload_sessions[0].file_id')" = "$batch_file_id"
          curl --fail --silent -X POST "http://localhost:8000/api/file-batches/$batch_id/files/$batch_file_id/content" \
            -H "Authorization: Bearer $token" -F upload_file=@/tmp/vision-ci.txt
          curl --fail --silent -X POST "http://localhost:8000/api/file-batches/$batch_id/complete" -H "Authorization: Bearer $token" >/dev/null
          for attempt in $(seq 1 60); do
            batch_state=$(curl --fail --silent "http://localhost:8000/api/file-batches/$batch_id" -H "Authorization: Bearer $token")
            batch_status=$(echo "$batch_state" | jq -r '.status')
            if [ "$batch_status" = "completed" ]; then
              exit 0
            fi
            if [ "$batch_status" = "failed" ]; then
              echo "$batch_state"
              exit 1
            fi
            sleep 5
          done
          echo "$batch_state"
          exit 1
      - name: Collect service logs
        if: always()
        run: docker compose logs --no-color
      - name: Stop the full stack
        if: always()
        run: docker compose down -v
